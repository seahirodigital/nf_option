name: JPX Data Fetch
on:
  schedule:
    # 毎日20:00 JST (日本時間)に実行 => 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch: # 手動実行用ボタンを追加

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
         # cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl

      - name: Fetch JPX Data and Export JSON
        run: |
          python scripts/fetch_teguchi.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Data Update: JPX Analytics [skip ci]"
          file_pattern: 'docs/data.json'
          branch: main
