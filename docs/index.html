<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日経先物・オプション分析 統合ツール</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#7C4DFF',
                        secondary: '#651FFF',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f8fafc; color: #334155; }
        /* Sidebar Animations */
        .sidebar { transition: width 0.3s ease; width: 68px; overflow: hidden; }
        .sidebar.open { width: 240px; }
        
        .sidebar-item { 
            display: flex; align-items: center; padding: 12px; cursor: pointer; 
            transition: all 0.2s; border-radius: 8px; margin-bottom: 4px;
            color: #64748b;
        }
        .sidebar-item:hover { background: #f1f5f9; color: #7C4DFF; }
        .sidebar-item.active { background: linear-gradient(135deg, #7C4DFF 0%, #651FFF 100%); color: white; box-shadow: 0 4px 6px -1px rgba(124, 77, 255, 0.3); }
        
        .sidebar-text { 
            opacity: 0; transition: opacity 0.2s; white-space: nowrap; margin-left: 12px; font-weight: 500; font-size: 0.875rem; 
        }
        .sidebar.open .sidebar-text { opacity: 1; transition-delay: 0.1s; }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="h-screen w-screen flex overflow-hidden">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar open glass-sidebar h-full flex flex-col p-3 shrink-0 relative z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        <!-- Logo / Toggle -->
        <div class="flex items-center p-2 mb-8 mt-2 cursor-pointer text-primary hover:text-secondary transition-colors" onclick="toggleSidebar()">
            <i data-lucide="layout-dashboard" class="w-7 h-7 shrink-0"></i>
            <span class="sidebar-text font-bold text-base tracking-tight leading-tight">アナリティクス<br>ダッシュボード</span>
        </div>
        
        <!-- Navigation -->
        <nav class="flex-1">
            <div class="sidebar-item active group" onclick="loadContent('teguchi.html', this)">
                <i data-lucide="bar-chart-2" class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"></i>
                <span class="sidebar-text">手口データ分析</span>
            </div>
            <div class="sidebar-item group" onclick="loadContent('option.html', this)">
                <i data-lucide="pie-chart" class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"></i>
                <span class="sidebar-text">オプション建玉監視</span>
            </div>
        </nav>
        
        <!-- Footer / Settings -->
        <div class="mt-auto pt-4 border-t border-slate-200/50">
            <div class="sidebar-item group" onclick="toggleSidebar()">
                <i data-lucide="panel-left-close" id="toggleIcon" class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"></i>
                <span class="sidebar-text">メニューを閉じる</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 h-full bg-[#f8fafc] relative">
        <iframe id="contentFrame" src="teguchi.html" class="w-full h-full border-none" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-downloads"></iframe>
    </main>

    <script>
        lucide.createIcons();
        
        const sidebar = document.getElementById('sidebar');
        const toggleIcon = document.getElementById('toggleIcon');
        let isOpen = true;

        function toggleSidebar() {
            isOpen = !isOpen;
            if(isOpen) {
                sidebar.classList.add('open');
                sidebar.classList.remove('w-[68px]');
                toggleIcon.setAttribute('data-lucide', 'panel-left-close');
            } else {
                sidebar.classList.remove('open');
                sidebar.classList.add('w-[68px]');
                toggleIcon.setAttribute('data-lucide', 'panel-left-open');
            }
            lucide.createIcons(); 
        }

        function loadContent(url, element) {
            const frame = document.getElementById('contentFrame');
            frame.style.opacity = '0.5';
            frame.src = url;
            frame.onload = () => { frame.style.opacity = '1'; };
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
